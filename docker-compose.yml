version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://expense_user:expense_pass@db:5432/expense_db
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - API_KEY=${API_KEY:-changeme}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./:/app
    networks:
      - expense-net

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: expense_db
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d expense_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - expense-net

volumes:
  postgres_data:

networks:
  expense-net:
    driver: bridge
